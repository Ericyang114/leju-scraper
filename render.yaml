services:
  - type: web
    name: leju-price
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DB_PATH
        value: /data/leju.db
    disk:
      name: leju-data
      mountPath: /data
      sizeGB: 1
